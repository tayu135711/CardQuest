<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#07131f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
    <title>CardQuest</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="ocean-shell">
        <div class="ocean-backdrop">
          <div class="caustics caustics-a"></div>
          <div class="caustics caustics-b"></div>
          <div class="bubbles" id="bubbles"></div>
          <div class="glow glow-one"></div>
          <div class="glow glow-two"></div>
        </div>

        <header class="hero">
          <p class="eyebrow">CardQuest / Underwater Calm</p>
          <div class="hero-copy">
            <h1>水中にいるみたいな、やさしい釣りの時間</h1>
            <p class="lede">
              青いものが見えたら釣り場が変わり、スマホを上下すると竿がゆらぎます。
              画面全体を、ふわっとした海の空気で包みます。
            </p>
          </div>
          <div class="hero-actions">
            <button id="enableCameraBtn" class="primary">カメラを起動</button>
            <button id="scanBtn">青を探す</button>
            <button id="resetBtn" class="ghost">データをリセット</button>
          </div>
        </header>

        <section class="main-grid">
          <article class="panel ocean-stage-panel">
            <div class="panel-header">
              <div>
                <h2>Fishing Scene</h2>
                <p class="section-caption">釣り場が切り替わると水の色も少し変化します。</p>
              </div>
              <span id="cameraStatus" class="status">未起動</span>
            </div>

            <div class="fishing-stage" id="fishingStage">
              <canvas id="pixiCanvas" class="pixi-canvas"></canvas>
              <canvas id="oceanCanvas" class="ocean-canvas"></canvas>
              <div class="water-surface"></div>
              <div class="water-rays"></div>
              <div class="water-particles"></div>
              <div class="water-glow"></div>
              <div class="spot-label" id="spotLabel">釣り場: 未選択</div>
              <div class="fish-shadow fish-shadow-a"></div>
              <div class="fish-shadow fish-shadow-b"></div>
              <div class="fish-shadow fish-shadow-c"></div>
              <div class="rod-system" id="rodSystem">
                <div class="rod-handle"></div>
                <div class="rod-line"></div>
                <div class="lure"></div>
              </div>
              <div class="focus-ring"></div>
            </div>

            <div class="scene-footer">
              <div class="scene-mood">
                <span class="mood-dot"></span>
                <span id="gameStatus">待機中</span>
              </div>
              <div class="scene-controls">
                <button id="reelBtn" class="primary" disabled>リールを巻く</button>
                <button id="skipBtn">スキップ</button>
              </div>
            </div>

            <p id="gamePrompt" class="game-prompt">
              青いものを映すと釣り場が切り替わります。
            </p>
            <p id="motionHint" class="motion-hint">竿の位置: 50%</p>
            <div class="reel-meter">
              <div id="meterFill" class="meter-fill"></div>
            </div>
          </article>

          <aside class="side-stack">
            <article class="panel gentle-panel">
              <div class="panel-header">
                <div>
                  <h2>Collection</h2>
                  <p class="section-caption">釣れた魚の記録です。</p>
                </div>
                <span id="collectionSummary" class="status">0件</span>
              </div>
              <div id="collectionList" class="collection-list"></div>
            </article>

            <article class="panel sensor-panel">
              <div class="panel-header">
                <div>
                  <h2>Sensor</h2>
                  <p class="section-caption">カメラは判定用の裏側センサーとして使います。</p>
                </div>
              </div>
              <div class="camera-frame compact">
                <video id="cameraVideo" autoplay playsinline muted></video>
                <canvas id="scanCanvas" class="hidden"></canvas>
                <div class="reticle"></div>
              </div>
              <p class="hint">青い物体を枠に入れて「青を探す」を押してください。</p>
            </article>
          </aside>
        </section>
      </section>
    </main>

    <div id="installBanner" class="install-banner hidden">
      <span>ホーム画面に追加できます。</span>
      <button id="installBtn">追加</button>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.min.js"></script>
    <script defer src="./js/data.js"></script>
    <script defer src="./js/storage.js"></script>
    <script defer src="./js/blue-detector.js"></script>
    <script defer src="./js/ocean-scene.js"></script>
    <script defer src="./js/pixi-effects.js"></script>
    <script defer src="./js/audio.js"></script>
    <script defer src="./js/motion.js"></script>
    <script defer src="./js/main.js"></script>
  </body>
</html>
